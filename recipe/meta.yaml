{% set name = "django-autocomplete-light" %}
{% set version = "4.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 2d4438320eefe1248ad0543e1d1673449f571afcc5c603fb487e5ed2fe4849cf

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - django >=5.2
    - six
    # - django-taggit 
    # - django-querysetsequence >=0.11
    # - django-nested-admin >=3.0.21

test:
  imports:
    - dal
    - dal_contenttypes
    - dal_genericm2m
    - dal_genericm2m_queryset_sequence
    - dal_gm2m
    - dal_gm2m_queryset_sequence
    - dal_legacy_static
    - dal_queryset_sequence
    - dal_select2
    - dal_select2_queryset_sequence
    - dal_select2_tagging
    - dal_select2_taggit
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://django-autocomplete-light.rtfd.org
  summary: Fresh autocompletes for Django
  dev_url: https://github.com/yourlabs/django-autocomplete-light
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - maksdan
